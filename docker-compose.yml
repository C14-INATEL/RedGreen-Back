version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: redgreen_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-redgreen}
    ports:
      # Maps the HOST port 5433 to the CONTAINER port 5432
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-redgreen}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: